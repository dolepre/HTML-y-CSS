<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de clientes</title>
    <link rel="stylesheet" href="style_register.css">
</head>
<body>
    <main class="register-container">
        <section class="register-card">
            <header>
                <h1>Registro de clientes</h1>
                <h2>Ingrese los datos</h2>
            </header>
            
            <form class="form-grid" action="#" method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ingrese su nombre"
                    pattern="[A-Za-záéíóúñÑ ]+">
                </div>

                <div class="form-group">
                    <label for="apellido">Cédula</label>
                    <input type="tel" id="Cedula" name="Cedula" required placeholder="12345678"
                    pattern="[0-9]{8,10}">
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres"
                    minlength="8">

                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required placeholder="1234-5678901"
                    pattern="[0-9]{11}">
                </div>

                <div class="form-group-large">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" required placeholder="Ingrese su dirección">
                </div>

                <div class="form-group">
                    <label>Tipo de cliente</label>
                    <div class="radio-options">
                        <input type="radio" id="natural" name="tipo-cliente" value="natural" required>
                        <label for="natural">Natural</label>
                        <input type="radio" id="jurídico" name="tipo-cliente" value="jurídico" required>
                        <label for="jurídico">Jurídico</label>
                    </div>

                </div>
                
                <div class="form-group">
                    <label for="Sector">Sector/Industria</label>
                    <select id="Sector" name="Sector" required>
                        <option value="">Seleccione un sector</option>
                        <option value="Sector 1">Tecnología</option>
                        <option value="Sector 2">Comercio</option>
                        <option value="Sector 3">Salud</option>
                        <option value="Sector 4">Educación</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Registrar</button>

            </form>
                
            <footer>
                <a href="#">¿Ya tienes cuenta? Inicia Sesión</a>
            </footer>
            
        </section>
    </main>
</body>
</html>
